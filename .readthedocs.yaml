# Read the Docs configuration file
# See https://docs.readthedocs.io/en/stable/config-file/v2.html

version: 2

build:
  os: ubuntu-24.04
  tools:
    python: "3.14"
  commands:
    # Build the documentation with uv, installing only the lightweight `docs`
    # dependency group (no torch needed since the notebooks are rendered, not
    # executed).
    - pip install uv
    - uv sync --no-default-groups --only-group docs --no-install-project
    - uv run --no-sync mkdocs build --site-dir $READTHEDOCS_OUTPUT/html
