# Install dependencies with uv, lint with ruff and run the test suite.
# For more information see: https://docs.astral.sh/uv/guides/integration/github/

name: Tests

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.14"]

    steps:
    - uses: actions/checkout@v4
    - name: Install uv
      uses: astral-sh/setup-uv@v6
      with:
        enable-cache: true
        python-version: ${{ matrix.python-version }}
    - name: Install dependencies
      run: uv sync --no-default-groups --group test
    - name: Lint with ruff
      run: |
        uvx ruff check .
        uvx ruff format --check .
    - name: Test with pytest
      run: uv run --no-sync pytest
